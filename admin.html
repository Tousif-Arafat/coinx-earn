<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoinX - Global Controller</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b0e14; --card: #151921; --accent: #00ffa3; --danger: #ff4757; --warning: #ffa502; --text: #f0f0f0; --border: #242b38; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        .header { background: var(--card); padding: 20px; text-align: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .container { max-width: 900px; margin: 0 auto; padding: 15px; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-card h4 { margin: 0; font-size: 12px; color: #888; }
        .stat-card div { font-size: 20px; font-weight: bold; color: var(--accent); margin-top: 5px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid var(--border); }
        h3 { margin-top: 0; color: var(--accent); font-size: 16px; display: flex; align-items: center; justify-content: space-between; }
        input, select, textarea, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid var(--border); outline: none; box-sizing: border-box; background: #0b0e14; color: white; }
        button { background: var(--accent); color: black; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; }
        .list-item { background: #1c222d; padding: 12px; border-radius: 10px; margin-top: 10px; font-size: 13px; line-height: 1.5; border-left: 4px solid var(--accent); }
        .actions { display: flex; gap: 5px; margin-top: 10px; }
        .btn-sm { padding: 6px 12px; border-radius: 5px; font-size: 11px; width: auto; }
        .bg-red { background: var(--danger); color: white; }
        .bg-orange { background: var(--warning); color: black; }
        .tab-bar { display: flex; overflow-x: auto; gap: 10px; margin-bottom: 15px; padding: 5px; background: var(--card); }
        .tab { padding: 8px 16px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 13px; border: 1px solid var(--border); }
        .tab.active { background: var(--accent); color: black; font-weight: bold; }
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card" style="width: 300px; text-align: center;">
        <h2>🔐 ADMIN CORE</h2>
        <input type="password" id="admin-pass" placeholder="Master Password">
        <button onclick="checkPass()">ENTER CONTROL ROOM</button>
    </div>
</div>

<div class="header">
    <h2 style="margin:0; color:var(--accent);">CoinX Master Panel</h2>
</div>

<div class="container">
    <div class="stats-grid">
        <div class="stat-card"><h4>Total Users</h4><div id="total-users">0</div></div>
        <div class="stat-card"><h4>Total Ads Viewed</h4><div id="total-ads">0</div></div>
        <div class="stat-card"><h4>Total Spins</h4><div id="total-spins">0</div></div>
        <div class="stat-card"><h4>Total Balance</h4><div id="total-balance">0</div></div>
    </div>

    <div class="tab-bar">
        <div class="tab active" onclick="showTab('users')">Users</div>
        <div class="tab" onclick="showTab('ads')">Ads & Notice</div>
        <div class="tab" onclick="showTab('vip')">VIP Tasks</div>
        <div class="tab" onclick="showTab('withdraw')">Withdraws</div>
    </div>

    <div id="tab-users" class="tab-content">
        <div class="card">
            <h3>👤 User Management (Live)</h3>
            <div id="user-list">Loading...</div>
        </div>
    </div>

    <div id="tab-ads" class="tab-content" style="display:none">
        <div class="card">
            <h3>📢 News/Notice Board</h3>
            <textarea id="notice-msg" rows="3" placeholder="Write notice for all users..."></textarea>
            <button onclick="saveData('settings/notice', 'notice-msg')">Update Notice</button>
        </div>
        <div class="card">
            <h3>📺 Ad Slots Control</h3>
            <div id="ads-container"></div>
            <button onclick="addAdSlot()" style="background:#3742fa; color:white; margin-top:15px">+ Create New Ad Slot</button>
        </div>
    </div>

    <div id="tab-vip" class="tab-content" style="display:none">
        <div class="card">
            <h3>🌟 Add VIP Task</h3>
            <input type="text" id="v-title" placeholder="Task Name">
            <input type="text" id="v-link" placeholder="Task URL">
            <input type="number" id="v-reward" placeholder="Coins Reward">
            <button onclick="addVIP()">Add VIP Task</button>
        </div>
        <div id="vip-list"></div>
    </div>

    <div id="tab-withdraw" class="tab-content" style="display:none">
        <div class="card">
            <h3>💰 Money Requests</h3>
            <div id="withdraw-list">No requests.</div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA99YS1p8wBXnd2tnS3_FA_dKjwSf59-hY",
        authDomain: "coinx-earn.firebaseapp.com",
        databaseURL: "https://coinx-earn-default-rtdb.firebaseio.com",
        projectId: "coinx-earn",
        storageBucket: "coinx-earn.firebasestorage.app",
        messagingSenderId: "205930694817",
        appId: "1:205930694817:web:b039084e9ea82a73a048e0"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function checkPass() {
        if(document.getElementById('admin-pass').value === "123456") {
            document.getElementById('login-screen').style.display = 'none';
        } else { alert("Access Denied"); }
    }

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-'+id).style.display = 'block';
        event.currentTarget.classList.add('active');
    }

    // --- GLOBAL STATS LOGIC ---
    db.ref("users").on("value", snap => {
        let uCount = 0, aCount = 0, sCount = 0, bCount = 0;
        let uList = "";
        snap.forEach(child => {
            const u = child.val();
            uCount++;
            aCount += (u.adsWatched || 0);
            sCount += (u.spinsDone || 0);
            bCount += (u.balance || 0);

            uList += `<div class="list-item" style="border-left-color: ${u.status === 'blocked' ? '#ff4757' : '#00ffa3'}">
                <b>${u.name || 'User'}</b> (ID: ${child.key})<br>
                📍 IP: ${u.lastIP || 'Unknown'}<br>
                💰 Balance: ${u.balance || 0} | 📺 Ads: ${u.adsWatched || 0} | 🎡 Spin: ${u.spinsDone || 0}<br>
                <div class="actions">
                    <button class="btn-sm bg-orange" onclick="updateUser('${child.key}', 'status', 'blocked')">Block</button>
                    <button class="btn-sm" onclick="updateUser('${child.key}', 'status', 'active')">Unblock</button>
                    <button class="btn-sm bg-red" onclick="deleteUser('${child.key}')">Delete</button>
                </div>
            </div>`;
        });
        document.getElementById('total-users').innerText = uCount;
        document.getElementById('total-ads').innerText = aCount;
        document.getElementById('total-spins').innerText = sCount;
        document.getElementById('total-balance').innerText = bCount;
        document.getElementById('user-list').innerHTML = uList;
    });

    // --- AD SLOTS LOGIC ---
    function addAdSlot() {
        const id = Date.now();
        db.ref("settings/ads/"+id).set({ name: "New Slot", link: "", reward: 10 });
    }

    db.ref("settings/ads").on("value", snap => {
        let html = "";
        snap.forEach(child => {
            html += `<div class="list-item">
                <input type="text" value="${child.val().link}" placeholder="Monetag Link" onchange="db.ref('settings/ads/${child.key}/link').set(this.value)">
                <div class="actions">
                    <button class="btn-sm bg-red" onclick="db.ref('settings/ads/${child.key}').remove()">Remove Slot</button>
                </div>
            </div>`;
        });
        document.getElementById('ads-container').innerHTML = html;
    });

    // --- WITHDRAW LOGIC ---
    db.ref("withdraws").on("value", snap => {
        let html = "";
        snap.forEach(child => {
            const w = child.val();
            html += `<div class="list-item">
                <b>${w.method}</b> - ${w.number}<br>Amount: ${w.amount} | User: ${w.userName || 'Unknown'}<br>
                <div class="actions">
                    <button class="btn-sm" style="background:#2ed573" onclick="handleWithdraw('${child.key}', 'Approved')">Approve</button>
                    <button class="btn-sm bg-red" onclick="handleWithdraw('${child.key}', 'Rejected')">Reject</button>
                </div>
            </div>`;
        });
        document.getElementById('withdraw-list').innerHTML = html || "No pending requests.";
    });

    // --- HELPER FUNCTIONS ---
    function saveData(path, inputId) {
        db.ref(path).set(document.getElementById(inputId).value).then(() => alert("Updated!"));
    }

    function updateUser(id, key, val) {
        db.ref("users/"+id+"/"+key).set(val);
    }

    function handleWithdraw(id, status) {
        if(confirm(status + " this request?")) {
            db.ref("withdraw_history/"+id).set({status: status, time: Date.now()});
            db.ref("withdraws/"+id).remove();
        }
    }

    function addVIP() {
        const title = document.getElementById('v-title').value;
        const link = document.getElementById('v-link').value;
        const reward = document.getElementById('v-reward').value;
        if(title && link && reward) {
            db.ref("vip_tasks").push({title, link, reward}).then(() => alert("VIP Task Added!"));
        }
    }
</script>
</body>
</html>
