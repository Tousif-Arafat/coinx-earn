<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoinX - Super Admin</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f1118; color: #e8e8e8; padding: 20px; }
        .card { background: #1a1d2e; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #2a2e45; }
        h2, h3 { color: #00d4aa; margin-top: 0; }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #2a2e45; outline: none; box-sizing: border-box; }
        input { background: #141728; color: white; }
        button { background: #00d4aa; color: #000; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .task-item { background: #232740; padding: 15px; border-radius: 10px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-delete { background: #ff4757; color: white; width: auto; padding: 5px 15px; font-size: 12px; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f1118; display: flex; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card" style="width: 320px; text-align: center;">
        <h3>Admin Access</h3>
        <input type="password" id="admin-pass" placeholder="Enter Admin Password">
        <button onclick="checkPass()">Login Now</button>
    </div>
</div>

<h2>🚀 CoinX Control Center</h2>

<div class="card">
    <h3>📺 Ads Slot Management</h3>
    <label>Slot 1 Link (Monetag):</label>
    <input type="text" id="ad1-link" placeholder="Paste Ad 1 Link">
    <button onclick="saveAds(1)">Update Slot 1</button>
    
    <div style="margin-top: 20px;"></div>
    
    <label>Slot 2 Link (Monetag):</label>
    <input type="text" id="ad2-link" placeholder="Paste Ad 2 Link">
    <button onclick="saveAds(2)" style="background: #3742fa; color: white;">Update Slot 2</button>
</div>

<div class="card">
    <h3>🌟 Manage VIP Tasks</h3>
    <input type="text" id="task-title" placeholder="Task Title (e.g. Subscribe Youtube)">
    <input type="number" id="task-reward" placeholder="Reward Coins (e.g. 50)">
    <input type="text" id="task-link" placeholder="Task Link (Youtube/Telegram)">
    <button onclick="addTask()">Add New VIP Task</button>
    
    <hr style="margin-top: 20px; border: 0.5px solid #2a2e45;">
    <div id="task-list-container">
        <h4>Current Tasks:</h4>
        <div id="task-list">Loading tasks...</div>
    </div>
</div>

<script>
    // আপনার দেওয়া Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyA99YS1p8wBXnd2tnS3_FA_dKjwSf59-hY",
        authDomain: "coinx-earn.firebaseapp.com",
        databaseURL: "https://coinx-earn-default-rtdb.firebaseio.com",
        projectId: "coinx-earn",
        storageBucket: "coinx-earn.firebasestorage.app",
        messagingSenderId: "205930694817",
        appId: "1:205930694817:web:b039084e9ea82a73a048e0"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function checkPass() {
        if(document.getElementById('admin-pass').value === "123456") {
            document.getElementById('login-screen').style.display = 'none';
        } else { alert("Wrong Password!"); }
    }

    // ADS SAVE
    function saveAds(slot) {
        const link = document.getElementById('ad'+slot+'-link').value;
        if(link) {
            db.ref("settings/ads/slot"+slot).set(link)
            .then(() => alert("Ad Slot "+slot+" Updated!"));
        }
    }

    // FETCH CURRENT ADS
    db.ref("settings/ads").on("value", (snap) => {
        const data = snap.val();
        if(data) {
            if(data.slot1) document.getElementById('ad1-link').value = data.slot1;
            if(data.slot2) document.getElementById('ad2-link').value = data.slot2;
        }
    });

    // ADD TASK
    function addTask() {
        const title = document.getElementById('task-title').value;
        const reward = document.getElementById('task-reward').value;
        const link = document.getElementById('task-link').value;

        if(title && reward && link) {
            const newTaskRef = db.ref("vip_tasks").push();
            newTaskRef.set({ title, reward, link })
            .then(() => {
                alert("VIP Task Added!");
                document.getElementById('task-title').value = "";
                document.getElementById('task-reward').value = "";
                document.getElementById('task-link').value = "";
            });
        }
    }

    // LOAD & DELETE TASKS
    db.ref("vip_tasks").on("value", (snap) => {
        const tasks = snap.val();
        let html = "";
        for(let id in tasks) {
            html += `<div class="task-item">
                <div>
                    <strong>${tasks[id].title}</strong><br>
                    <small style="color: #00d4aa;">${tasks[id].reward} Coins</small>
                </div>
                <button class="btn-delete" onclick="deleteTask('${id}')">Delete</button>
            </div>`;
        }
        document.getElementById('task-list').innerHTML = html || "No tasks available.";
    });

    function deleteTask(id) {
        if(confirm("Delete this task?")) {
            db.ref("vip_tasks/"+id).remove();
        }
    }
</script>
</body>
</html>
